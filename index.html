<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Academic OS & Progress Matrix</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --ctx-bg: #f8fafc;
            --ctx-card: #ffffff;
            --ctx-text: #0f172a;
            --ctx-primary: #6366f1;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--ctx-bg); color: var(--ctx-text); }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .glass-card { background: var(--ctx-card); border: 1px solid #e2e8f0; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .glass-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); }
        
        /* Custom dynamic tab switching styles */
        .tab-panel { display: none; }
        .tab-panel.active-panel { display: block; }
        
        .nav-pills .nav-link { color: #64748b; border-radius: 10px; font-weight: 500; padding: 10px 20px; border: none; background: none; transition: all 0.2s; }
        .nav-pills .nav-link.active { background-color: var(--ctx-primary); color: white; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); }
        .badge-pill { border-radius: 30px; padding: 5px 12px; font-weight: 600; }
        .progress-track { height: 6px; border-radius: 10px; background-color: #e2e8f0; overflow: hidden; }
        .streak-fire { color: #f97316; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>

                    <i class="fa-solid fa-fire streak-fire"></i> Streak: <span id="streak-counter" class="fw-bold text-warning">0</span> Days
                </div>
                <button class="btn btn-sm btn-info fw-bold" onclick="generateAdvancedDemo()"><i class="fa-solid fa-wand-magic-sparkles me-1"></i> Synthesize Demo</button>
